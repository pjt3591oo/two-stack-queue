
<style>
  :root {
    --color-text-primary: #e4e4e7;
    --color-text-secondary: #a1a1aa;
    --color-text-tertiary: #71717a;
    --color-text-info: #60a5fa;
    --color-background-primary: #18181b;
    --color-background-secondary: #27272a;
    --color-border-secondary: #3f3f46;
    --color-border-tertiary: #3f3f46;
    --color-border-info: #3b82f6;
    --border-radius-md: 8px;
    --font-mono: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, monospace;
  }
  body { background: #09090b; color: #e4e4e7; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  * { box-sizing: border-box; }
  .root { padding: 1.5rem 1rem; font-size: 14px; }
  .stacks { display: flex; gap: 24px; justify-content: center; align-items: flex-end; }
  .stack-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .stack-label { font-size: 12px; color: var(--color-text-secondary); font-weight: 500; }
  .stack-hint { font-size: 11px; color: var(--color-text-tertiary); }
  .stack-box {
    width: 120px;
    min-height: 200px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    background: var(--color-background-secondary);
    display: flex;
    flex-direction: column-reverse;
    gap: 4px;
    padding: 6px;
    position: relative;
    transition: border-color 0.3s;
  }
  .stack-box.active { border-color: var(--color-border-info); }
  .stack-item {
    height: 36px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 500;
    font-size: 14px;
    animation: popIn 0.2s ease;
    flex-shrink: 0;
  }
  @keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes fly {
    0% { transform: translateY(0); opacity: 1; }
    50% { transform: translateY(-60px); opacity: 0.5; }
    100% { transform: translateY(0); opacity: 1; }
  }
  .flying { animation: fly 0.5s ease; }
  .arrow-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 48px;
    gap: 6px;
  }
  .arrow-label { font-size: 10px; color: var(--color-text-tertiary); text-align: center; line-height: 1.3; }
  .pour-arrow {
    font-size: 22px;
    color: var(--color-text-secondary);
    transition: color 0.3s;
    user-select: none;
  }
  .pour-arrow.active { color: var(--color-text-info); }
  .controls { display: flex; gap: 8px; align-items: center; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
  .inp { width: 64px; padding: 6px 8px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 13px; text-align: center; }
  button { padding: 6px 16px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 13px; cursor: pointer; font-weight: 500; }
  button:hover { background: var(--color-background-secondary); }
  button:active { transform: scale(0.97); }
  .log { margin-top: 16px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 14px; font-size: 12px; color: var(--color-text-secondary); min-height: 48px; line-height: 1.7; font-family: var(--font-mono); }
  .complexity { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }
  .badge { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 4px 10px; font-size: 11px; color: var(--color-text-secondary); }
  .badge b { color: var(--color-text-primary); }
  .empty-hint { font-size: 11px; color: var(--color-text-tertiary); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
</style>
<div class="root">
  <div class="stacks">
    <div class="stack-wrap">
      <div class="stack-label">Stack 1 — inbox</div>
      <div class="stack-box" id="s1">
        <span class="empty-hint" id="e1">비어 있음</span>
      </div>
      <div class="stack-hint">enqueue → push</div>
    </div>
    <div class="arrow-area">
      <div class="pour-arrow" id="pour-arrow">→</div>
      <div class="arrow-label">outbox 비면<br>전부 이동</div>
    </div>
    <div class="stack-wrap">
      <div class="stack-label">Stack 2 — outbox</div>
      <div class="stack-box" id="s2">
        <span class="empty-hint" id="e2">비어 있음</span>
      </div>
      <div class="stack-hint">dequeue ← pop</div>
    </div>
  </div>
  <div class="controls">
    <input class="inp" id="val" type="number" value="1" min="0" max="99" placeholder="값">
    <button onclick="enqueue()">Enqueue</button>
    <button onclick="dequeue()">Dequeue</button>
    <button onclick="resetAll()">초기화</button>
  </div>
  <div class="log" id="log">값을 입력하고 Enqueue / Dequeue 를 눌러보세요.</div>
  <div class="complexity">
    <div class="badge">Enqueue: <b>O(1)</b></div>
    <div class="badge">Dequeue (amortized): <b>O(1)</b></div>
    <div class="badge">공간: <b>O(n)</b></div>
  </div>
</div>
<script>
const COLORS = [
  ['#E6F1FB','#0C447C'], ['#EAF3DE','#27500A'], ['#FAEEDA','#633806'],
  ['#E1F5EE','#085041'], ['#FAECE7','#712B13'], ['#EEEDFE','#3C3489'],
  ['#FBEAF0','#72243E'],
];
let s1 = [], s2 = [], colorIdx = 0, counter = 0;

function colorFor(id) {
  return COLORS[id % COLORS.length];
}

function render() {
  const b1 = document.getElementById('s1');
  const b2 = document.getElementById('s2');
  document.getElementById('e1').style.display = s1.length ? 'none' : 'block';
  document.getElementById('e2').style.display = s2.length ? 'none' : 'block';
  // keep only items, remove old ones
  Array.from(b1.querySelectorAll('.stack-item')).forEach(e => e.remove());
  Array.from(b2.querySelectorAll('.stack-item')).forEach(e => e.remove());
  s1.forEach(item => {
    const [bg, fg] = colorFor(item.cid);
    const el = document.createElement('div');
    el.className = 'stack-item';
    el.style.background = bg;
    el.style.color = fg;
    el.textContent = item.val;
    b1.appendChild(el);
  });
  s2.forEach(item => {
    const [bg, fg] = colorFor(item.cid);
    const el = document.createElement('div');
    el.className = 'stack-item';
    el.style.background = bg;
    el.style.color = fg;
    el.textContent = item.val;
    b2.appendChild(el);
  });
}

function log(msg) {
  document.getElementById('log').textContent = msg;
}

function enqueue() {
  const v = document.getElementById('val').value.trim();
  if (v === '') { log('값을 입력하세요.'); return; }
  const item = { val: Number(v), cid: counter++ };
  s1.push(item);
  render();
  document.getElementById('s1').classList.add('active');
  setTimeout(() => document.getElementById('s1').classList.remove('active'), 500);
  log(`Enqueue(${v}) → Stack1에 push. O(1)`);
  document.getElementById('val').value = Number(v) + 1;
}

async function dequeue() {
  if (s1.length === 0 && s2.length === 0) { log('큐가 비어 있습니다.'); return; }
  const arrow = document.getElementById('pour-arrow');
  if (s2.length === 0) {
    // pour s1 into s2
    arrow.classList.add('active');
    log(`outbox 비어 있음 → Stack1의 ${s1.length}개 원소를 Stack2로 이동 중...`);
    await new Promise(r => setTimeout(r, 100));
    while (s1.length > 0) {
      s2.push(s1.pop());
    }
    render();
    await new Promise(r => setTimeout(r, 400));
    arrow.classList.remove('active');
  }
  const item = s2.pop();
  render();
  document.getElementById('s2').classList.add('active');
  setTimeout(() => document.getElementById('s2').classList.remove('active'), 500);
  log(`Dequeue() → ${item.val} 반환. Stack2에서 pop. (amortized O(1))`);
}

function resetAll() {
  s1 = []; s2 = []; counter = 0;
  render();
  log('초기화되었습니다.');
}

render();
</script>
